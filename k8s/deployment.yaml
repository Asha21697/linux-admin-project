apiVersion: apps/v1
kind: Deployment

metadata:
  name: technova

spec:
  replicas: 3

  selector:
    matchLabels:
      app: technova

  template:
    metadata:
      labels:
        app: technova

    spec:
      containers:
      - name: technova
        image: asha21697/technova-cicd:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80
